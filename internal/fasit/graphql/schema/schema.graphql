}

"""
The query root for the Fasit GraphQL API.
"""
type Query {
	configuration(
		feature: String!
		envID: ID
	): Configurations!
"""
Returns the raw helm values for a feature. Requires the feature name, and either the environment ID or the environment and tenant name.
"""
	helmValues(
		feature: String!
		envID: ID
		env: String
		tenant: String
	): RawMessage!
	costForTenant(
		tenantID: ID!
		filter: CostFilter
	): TenantCosts!
	cost(
		filter: CostFilter
	): Cost!
	deployments(
		feature: String
	): [Deployment!]!
	deployment(
		id: ID!
	): Deployment!
	deploymentStatus(
		deploymentID: ID!
		environmentID: ID!
	): DeploymentStatus!
	features: [Feature!]!
	feature(
		name: String!
	): Feature!
	history(
		id: ID!
	): FeatureHistory!
	featureState(
		envID: ID!
		feature: String!
	): FeatureState!
	rollouts(
		feature: String
	): [Rollout!]!
	rollout(
		feature: String!
		version: String!
	): Rollout!
"""
tenant returns the given tenant.
"""
	tenant(
"""
id of the requested tenant.
"""
		id: ID
		slug: String
	): Tenant!
	tenants: [Tenant!]!
"""
userInfo returns the user.
"""
	userInfo: userInfo
}

