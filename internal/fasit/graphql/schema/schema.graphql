"""
The mutation root for the Fasit GraphQL API.
"""
type Mutation {
	configurationCreate(
		configuration: NewConfiguration!
	): Configuration!
	configurationUpdate(
		id: ID!
		configuration: UpdateConfiguration!
	): Configuration!
	configurationDelete(
		id: ID!
	): Boolean!
	createDeployment(
		input: CreateDeploymentInput!
	): ID!
	deleteDeployment(
		deploymentID: ID!
	): Boolean!
	environmentCreate(
		environment: EnvironmentCreate!
	): Environment!
"""
updateEnvironment updates an existing environment
"""
	environmentUpdate(
"""
id of requested environment.
"""
		id: ID!
"""
input contains information about the updated environment.
"""
		input: EnvironmentUpdate!
	): Environment!
"""
Change the reconcile flag for an environment
"""
	environmentSetReconcile(
		id: ID!
		reconcile: Boolean!
	): Environment!
	featureStateSave(
		envID: ID!
		enabled: Boolean!
		feature: String!
	): FeatureState!
	playground(
		input: PlaygroundInput!
	): Playground!
	rolloutMarkFailed(
		feature: String!
		version: String!
	): Rollout!
	deleteHelmInstall(
		envID: ID!
		name: String!
	): Boolean!
	tenantCreate(
		tenant: TenantCreate!
	): Tenant!
}

type NaisdWarning implements Warning{
	message: String!
	environment: Environment!
}

